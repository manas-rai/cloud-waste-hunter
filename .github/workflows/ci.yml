name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"] # The branch you want to deploy from
  workflow_dispatch: # Allows manual trigger

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # If your frontend is in a subdirectory, uncomment below
          # cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        # working-directory: ./frontend # Uncomment if in a subdirectory

      - name: Build
        run: npm run build
        # working-directory: ./frontend # Uncomment if in a subdirectory

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Path to your build output (e.g., ./build, ./dist, ./frontend/dist)
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
